name: Export personalized LFM2 for WebGPU

on:
  workflow_dispatch:
    inputs:
      source_model:
        description: Public Hugging Face checkpoint to export
        required: true
        default: danelcsb/daniel-lfm2-350m
      release_tag:
        description: GitHub release tag used by the browser runtime
        required: true
        default: daniel-lfm2-onnx-v1

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      SOURCE_MODEL: ${{ inputs.source_model }}
      GH_TOKEN: ${{ github.token }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Check out portfolio
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Evaluate source checkpoint with frozen prompts
        run: |
          uv run scripts/evaluate_daniel_lfm2_test.py \
            --model "$SOURCE_MODEL" \
            --device cpu \
            --output "$RUNNER_TEMP/daniel-source-evaluation.json"

      - name: Export and parity-test personalized Q4 model
        run: |
          uv run scripts/export_daniel_lfm2_onnx.py \
            --source "$SOURCE_MODEL" \
            --output-dir "$RUNNER_TEMP/daniel-export" \
            --baseline-evaluation "$RUNNER_TEMP/daniel-source-evaluation.json" \
            --upload-hf

      - name: Preserve quantization evaluations
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: daniel-lfm2-quantization-parity-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/daniel-source-evaluation.json
            ${{ runner.temp }}/daniel-export/quantized-evaluation.json
            ${{ runner.temp }}/daniel-export/quantization-parity.json
          if-no-files-found: warn

      - name: Prepare browser release assets
        run: |
          set -euo pipefail
          export_dir="$RUNNER_TEMP/daniel-export/exports/daniel-lfm2-350m-ONNX"
          asset_dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$asset_dir"

          for file in config.json generation_config.json tokenizer.json tokenizer_config.json chat_template.jinja README.md; do
            cp "$export_dir/$file" "$asset_dir/$file"
          done
          if [[ -f "$export_dir/special_tokens_map.json" ]]; then
            cp "$export_dir/special_tokens_map.json" "$asset_dir/special_tokens_map.json"
          fi
          cp "$export_dir/onnx/model_q4.onnx" "$asset_dir/model_q4.onnx"
          cp "$export_dir/onnx/model_q4.onnx_data" "$asset_dir/model_q4.onnx_data"
          cp "$export_dir/quantized-evaluation.json" "$asset_dir/quantized-evaluation.json"
          cp "$export_dir/quantization-parity.json" "$asset_dir/quantization-parity.json"

          jq -n \
            --arg source "$SOURCE_MODEL" \
            --arg exporter_revision "9a23ddd23035165f7414a5de3220a51e85780f64" \
            --arg commit "$GITHUB_SHA" \
            --slurpfile parity "$export_dir/quantization-parity.json" \
            '{source_model:$source, exporter_revision:$exporter_revision, portfolio_commit:$commit, precision:"q4", webgpu:true, quantization_parity:{quality:$parity[0].quality, performance:$parity[0].performance, publication_allowed:$parity[0].publication_allowed}}' \
            > "$asset_dir/manifest.json"

      - name: Publish CORS-enabled model branch
        run: |
          set -euo pipefail
          export_dir="$RUNNER_TEMP/daniel-export/exports/daniel-lfm2-350m-ONNX"
          model_root="models/daniel-lfm2-350m-ONNX"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin refs/heads/model-assets >/dev/null 2>&1; then
            git fetch origin model-assets
            git switch -C model-assets origin/model-assets
          else
            git switch --orphan model-assets
            git rm -rf . || true
          fi

          git lfs install --local
          git lfs track "$model_root/**"
          rm -rf "$model_root"
          mkdir -p "$model_root/onnx"

          for file in config.json generation_config.json tokenizer.json tokenizer_config.json chat_template.jinja README.md; do
            cp "$export_dir/$file" "$model_root/$file"
          done
          if [[ -f "$export_dir/special_tokens_map.json" ]]; then
            cp "$export_dir/special_tokens_map.json" "$model_root/special_tokens_map.json"
          fi
          cp "$export_dir/onnx/model_q4.onnx" "$model_root/onnx/model_q4.onnx"
          cp "$export_dir/onnx/model_q4.onnx_data" "$model_root/onnx/model_q4.onnx_data"
          cp "$export_dir/quantized-evaluation.json" "$model_root/quantized-evaluation.json"
          cp "$export_dir/quantization-parity.json" "$model_root/quantization-parity.json"
          cp "$RUNNER_TEMP/release-assets/manifest.json" "$model_root/manifest.json"

          git add .gitattributes "$model_root"
          git commit -m "Publish personalized LFM2 WebGPU assets"
          git push origin HEAD:model-assets

      - name: Publish browser model release
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/release-assets"
          parity_summary=$(jq -r '"strict drop=" + (.quality.strict_score_drop|tostring) + ", answer change=" + (.quality.answer_change_rate|tostring) + ", throughput ratio=" + (.performance.throughput_ratio|tostring)' "$asset_dir/quantization-parity.json")
          notes="Personalized symmetric-Q4 LFM2 export for Daniel OS. Built from $SOURCE_MODEL at portfolio commit $GITHUB_SHA. Quantization parity passed: $parity_summary."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$asset_dir"/* --clobber
            gh release edit "$RELEASE_TAG" --notes "$notes" --title "Daniel OS LFM2 WebGPU v1"
          else
            gh release create "$RELEASE_TAG" "$asset_dir"/* \
              --title "Daniel OS LFM2 WebGPU v1" \
              --notes "$notes"
          fi
