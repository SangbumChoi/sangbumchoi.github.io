name: Test Daniel LFM2 browser integration

concurrency:
  group: daniel-lfm2-browser-smoke
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/test-daniel-lfm2-webgpu.yml
      - _config.yml
      - assets/js/jarvis.js
      - assets/js/lfm-worker.js
      - assets/js/runtime-policy.mjs
      - scripts/test_runtime_policy.mjs
      - scripts/test_personalized_lfm2_webgpu.mjs
  workflow_dispatch:
    inputs:
      target_url:
        description: Deployed portfolio URL to test
        required: true
        default: https://sangbumchoi.github.io/

jobs:
  webgpu-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_URL: ${{ inputs.target_url || 'https://sangbumchoi.github.io/' }}
      MODEL_TIMEOUT_MS: "300000"
      REQUIRE_FULL_INFERENCE: "0"

    steps:
      - name: Check out portfolio
        uses: actions/checkout@v4

      - name: Verify adaptive runtime policy
        run: node --test scripts/test_runtime_policy.mjs

      - name: Install Playwright in an isolated directory
        run: |
          test_dir="$RUNNER_TEMP/daniel-webgpu-test"
          mkdir -p "$test_dir"
          cp scripts/test_personalized_lfm2_webgpu.mjs "$test_dir/test.mjs"
          cd "$test_dir"
          npm init -y
          npm install --save-exact @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Wait for the matching Pages deployment
        run: |
          expected_version="$(awk '/jarvis_asset_version/{print $3}' _config.yml)"
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error --location \
              "${TARGET_URL}?deployment=${GITHUB_SHA}-${attempt}" | grep -q "jarvis.js?v=${expected_version}"; then
              echo "Found deployed asset version ${expected_version}."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for asset version ${expected_version}." >&2
          exit 1

      - name: Verify model assets and software WebGPU startup
        run: |
          cd "$RUNNER_TEMP/daniel-webgpu-test"
          timeout --signal=TERM --kill-after=30s 8m node test.mjs
